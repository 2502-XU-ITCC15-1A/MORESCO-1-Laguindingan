# ─────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — Main Entry Point
#
# Traffic routing:
#   /        → React frontend (client container on port 80)
#   /api/*   → Node.js/Express backend (app container on port 3000)
#   /health  → Node.js/Express health check
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # ── React Frontend ──────────────────────────────
    # All normal requests go to the React container.
    location / {
        proxy_pass         http://client:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Express API ─────────────────────────────────
    # Requests starting with /api/ are proxied to the
    # Node.js container. The path is passed unchanged.
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health Check passthrough ─────────────────────
    location /health {
        proxy_pass http://app:3000/health;
    }
}
