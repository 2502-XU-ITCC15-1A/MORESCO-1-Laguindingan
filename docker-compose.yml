services:
  nginx:
    image: nginx:alpine
    container_name: milestone2_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
      client:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: milestone2_client
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: milestone2_app
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=db
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    container_name: milestone2_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─────────────────────────────
# Named Volumes
# ─────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─────────────────────────────
# Networks
# ─────────────────────────────
networks:
  app_network:
    driver: bridge
